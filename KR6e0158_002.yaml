body:
  text: 復次眾生愚昧童習世典躭著世事飲食男女埋沒一生耳目之表六合之外茫然不信塵如雪飛蟻若牛鬪所不聞見謂蒼蒼者清氣為天或如雞卵或如倚蓋都無主宰日月亦氣入地復昇殂落為死清氣歸天濁氣歸地魂魄消散神明斷滅鬼者歸也至作無鬼之論不信人死神識更生蛻故趨新有三世三報善惡因果錙銖不失雖聖教久被於此方熏陶漸漬上根正信固多然毀謗詆訾亦復不少自餘悠悠泛泛縱窺一班強半為世法所奪如隔日瘧如石壓草乍信乍疑了無確見高推聖境不信自心是佛不肯抖擻塵勞則流浪六道七趣理勢之所不免六道者一天道有三界一欲界同受微妙五欲形雖出動心迹尚交二色界尚有形質而無欲念獨行無交未盡形累三無色界形色已無依識而住身心滅盡定性現前欲界六天曰四天王天忉利天夜摩天兜率天化樂天他化自在天此天身長六十由旬當二千四百里以人間一千六百歲為一日如是壽一萬六千歲若人能持五戒行十善即生彼界受天福樂色界四禪天初禪三天曰梵眾天梵輔天大梵天二禪三天曰少光天無量光天光音天三禪三天曰少淨天無量淨天徧淨天四禪九天曰福生天福愛天廣果天此處火水風災所不能及凡夫於戒善中兼修有漏禪定得生彼界受天福樂曰無想天外道伏惑修禪第七識中俱生我執念念現流生滅為因不能發明不生滅性故生此天曰無煩天無熱天善見天善現天色究竟天壽五千劫此五復名不還天三果聖人於下界中九品習氣修惑滅盡安立居處無色界四天曰空處天識處天無所有天非想非非想天無業果色有定果色為窮空不盡空理定性聲聞所居壽八萬四千劫從此三界若是凡夫業果酬答答盡入輪二者人道處於天地之間洲潬之上亦欲界攝有四千種類種種身形狀貌壽量名號心性知見欲樂意行威儀衣服飲食處於種種村營聚落城邑宮殿皆貪受麤弊五欲六塵有利根大器生於其中遇佛正法能修聖道然得人身者如指甲上土失人身者如大地土於中岐出不依正覺別修妄念遊於山林十種仙趣三者阿修羅道亦有四生或居鄰日月或歸水宿穴力洞無畏乘通入空能與忉利天爭衡男醜女美四趣所攝壽同造化四者畜生道即今毛羣羽族鱗介蝡動水陸空散之類五者餓鬼道或住人間幽穢之處曠野沙漠或沉水輪或生火際以夜為晝質細無影常被焚溺恒受饑渴壽經劫數見舍衛國城七返成壞六者地獄道經云三千大千世界鐵圍兩山黑闇之間銕城縱廣一千六百萬里有八萬四千鬲以鐵為地上覆銕網火燒此城表裏洞赤其獄名曰眾合黑暗刀輪劍林鐵機刺林鐵網鐵窟鐵丸尖石炭坑燒林虎狼呌喚鑊湯爐炭刀山劍樹火磨火城銅柱鐵床火車火輪飲銅吐火大熱大寒拔舌釘身犁耕斬斫刀兵屠裂灰河沸屎寒氷淤泥愚癡啼哭聾盲瘖瘂鐵鈎鐵觜大小泥犁阿鼻地獄阿鼻柰何義謂無遮無救無間無動極熱極惱不住不閑大燄猛熱猛火入心各有獄主獄卒牛頭阿傍異常苦具苦中苦者集在其中人間歲月積六十小劫為阿鼻獄一晝夜諸罪人如是壽經八萬四千大劫一人身受罪徧一大獄多人亦徧以業力故不相妨礙閻羅大王總十八獄王一名迦延二屈尊三沸壽四沸屈五迦世六𭗡傞七湯謂八鐵迦然九惡生十呻吟十一毗迦十二遙頭十三提薄十四夷大十五悅頭十六穿骨十七名身十八觀身又經云東方鐵圍山間其山崦𭗮幽冥高峻了無草木名曰地獄烏門千仞黑壁萬尋俠道兩邊有三十六王其王名曰恒伽噤王波吉頭王廣目都王安頭羅王虎目見王陽聲吉王大諍訟王吸血鬼王安得羅王陀達王達多羅王吉棃善王安睺羅王寶首王金樹吉王大惡聲王鳥頭王等虎眼王等象牙王等震聲王等歸首王衣首王見首王廣安王廣定王王頭王立正王立見王摩尼羅王都曹王部見王惡目王善王龍口王鬼王南安王所典獄名鐵車鐵馬鐵牛鐵驢鐵衣鐵珠烊銅灌口流火鐵床耕舌斫首燒脚鐵丸飲鐵珠飛刀火箭𦞙肉身燃火丸仰口諍論雨火流火糞屎鈎陰火象洋聲咬呌鐵𨪏鏫崩埋燃手脚銅狗鋸牙剝皮飲血解身鐵屋鐵山飛火咬呌分頭地獄此中悉是作惡比丘比丘尼沙彌沙彌尼受罪且以人間之火釜中煑石經年不壞若投石地獄湯中須臾粉碎一事較量餘即可知六道明明若此我等從朝至暮從昏至旦念念所起所造徧六道業報不知多少何況一月一年終身所為於六道中何力能免惟有懺悔乃得解脫相與悲淚怖懼翹勤至到洗心請忍願乞除滅皈依四德三伊圓滿圓寂十方諸佛南無清淨法身毗盧遮那佛南無圓滿報身盧舍那佛南無千百億化身釋迦牟尼佛南無一切十億國土微塵數同名金剛藏佛南無十億國土微塵數同名金剛雞兜佛南無十百千國土微塵數同名金剛幢佛南無十百千國土微塵數同名善法佛南無十百千國土微塵數同名稱心佛南無一佛國土微塵數同名普功德佛南無不可說佛國土微塵數同名不可勝佛南無不可說佛國土微塵數同名毗婆尸佛南無十佛國土微塵數同名普幢佛南無八十億佛國土微塵數不可數百千萬億那由他同名普賢佛南無一佛國土微塵數同名佛勝佛南無十佛國土微塵數百千萬億那由他不可說同名普稱自在佛南無恒河沙同名賢行佛南無恒河沙同名無邊命佛南無恒河沙同名不動佛南無恒河沙同名月智佛南無恒河沙同名日藏佛南無恒河沙同名善光佛南無恒河沙同名金剛佛南無五百同名大慈悲佛南無善眼劫七十那由他佛南無善見劫中七十二億佛南無梵讚歎劫中一萬八千佛南無意入世界無量華照垂髮菩薩南無現前受記一生補處兜率內宮彌勒菩薩南無地藏菩薩南無寶達菩薩經云一切眾生實本真淨妄見妄習內因愛染情妄不休能生愛水心憶珍羞口中水出心憶憐恨目中淚盈貪求財寶舉體光潤心著行婬男女二根自然流液流結潤濕自然從墜分外渴仰發明虗想能生勝氣是故心持禁戒舉身輕清心持呪印顧盼雄毅心欲生天夢想飛舉心存佛國聖境冥現飛動不沉自然超越死逆生順二習相交純想即飛必生天上兼福兼慧心開見佛隨願往生一情九想輕舉非遠即為飛仙二情八想為大力鬼三情七想為夜叉四情六想為羅剎情想均等不飛不墜生於人間想明斯聰情幽斯鈍情多想少流入橫生重為毛羣輕為羽族七情三想沉為餓鬼八情二想生有間獄九情一想生無間獄身入風火二交過地純情即沉入阿鼻獄若沉心中有謗大乘毀佛禁戒誑妄說法虗貪信施濫膺恭敬五逆十重劫盡更生十方阿鼻地獄循造惡業雖則自招眾同分中兼有元地造十習因受六交報今當懺悔婬習交接研磨不休欲火火坑大猛火光於中發動如手自摩觸暖相現前二習相然故有鐵床銅柱諸事燒煠罪報懺悔貪習交計吸攬不止貪水瘴海積寒堅氷於中凍冽如吸縮風氣有冷觸生二習相陵故有吒吒波波羅羅青赤白蓮寒氷等事冷禁哀號罪報懺悔慢習交陵恃我貢高矜驕不息癡水巨溺騰逸奔波如口舌綿味因而水發二習相鼓故有血河灰河熱沙毒海融銅灌吞諸事罪報懺悔瞋習交衝忤結不息熱惱居懷性不安隱心熱發火鑄氣為金即有刀山鐵梱劍樹劉輪斧鉞鎗鋸如人銜冤殺氣飛動二習相擊故有宮割斬斫剉刺槌擊諸事罪報懺悔詐習交誘奸偽讒賊矯設具儀諂曲為性調引不住故有繩木絞校如水浸田草木生長二習相延故有杻械枷鎻鞭杖撾棒諸事罪報懺悔誑習交欺矯現有德蛇虺劫殺誣罔不止飛心造奸故有塵土屎尿穢污不淨如塵隨風各無所見二習相加故有沒溺騰擲飛墜漂淪諸事罪報懺悔冤習交嫌酖毒銜恨懷結不捨故有飛石投礰匣貯車檻甕盛囊撲如陰毒人懷抱畜惡二習相吞故有投擲擒捉擊財拋撮騰砲牢柵諸事罪報懺悔見習交明異執謬解因於身邊無取戒禁五見生六十二見毒壑坑穽邪悟諸業違拒相反故有王使主吏證執文籍如行路人一往一來事業不同取捨違反故有勘問權詐考訊推鞠察訪披究照明善惡童子手執文簿辭辨諸事罪報懺悔枉習交加橫陷善類抑直為曲誣謗所無讒虎射工偏倚不正故有合山合石碾磑耕磨如讒賊人逼枉良善二習相排故有押捺搥按蹙漉衡度𢫫身透網支解倒懸諸事罪報懺悔訟習交諠藏覆己過隱匿私謀戴山履海不肯服承故有鑑見照燭如於日中不能藏影二習相陳故有惡友業鏡火珠披露宿業對驗許發諸事罪報如是十習業因我等無不重疊備造當受惡果捫心撫己毛髮聳竪一一披瀝懺悔并為多生此生父母累劫今世冤親真諦俗諦現前眷屬有緣聚會執勞運力見聞隨喜及四生六道一切眾生同修懺悔各發始覺之心俱見本覺之性共尊正覺之路同入妙覺之海歸命禮三寶南無十千同名滿足佛南無三萬同名能聖佛南無十八億同名實體法式佛南無十八億同名日月燈佛南無千五百同名大威德佛南無一萬五千同名日佛南無一萬八千同名因陀羅幢王佛南無三十六億十一萬九千五百同名淨王佛南無不可嫌身佛南無八十億同名法體決定佛南無人自在聲佛南無千世自在聲佛南無千善無垢聲自在王佛南無千離無畏聲自在王佛南無千無垢威德自在王佛南無五百日聲自在王佛南無五百樂自在聲佛南無九千法莊嚴佛南無無垢世界無垢光塵沙諸佛南無無垢廣世界勝護塵沙諸佛南無安樂世界賢日光明菩薩南無安樂世界師子吼身菩薩南無寶塔須彌幢世界無上首妙德王菩薩南無香勝離垢光明世界普智光明慧燈菩薩復次懺悔六交報經云一切眾生六識造業所招惡報從六根出良以性中元一用中終六一根造業五根助發故當根得報餘根交受種種苦事悉繇心感近如一肢有疾百骸弗安今耳聞一物眼必欲見心必欲得舌必言之身必取之鼻必齅之是則根互趣境報亦交徧理事當然勿措疑惑懺悔眼根見報招引惡果此見業交則臨終時先見猛火滿十方界亡者神識飛墜乘煙入無間獄發明二相一者明見則能徧見種種惡物生無量畏二者暗見寂然不見生無量恐如是見火燒見能為火城火網燒聽能為鑊湯烊銅燒息能為黑煙紫𦦨燒味能為焦丸鐵糜燒觸能為熱灰罏炭燒心能生星火迸洒煽鼓空界罪報懺悔耳根聞報招引惡果此聞業交則臨終時先見波濤沒溺天地亡者神識降注乘流入無間獄發明二相一者開聽聽種種閙精神愗亂二者閉聽寂無所聞幽魄沉沒如是聞波注聞則能為責為詰注見則能為雷為吼為惡毒氣注息則能為雨為霧洒諸毒蟲周滿身體注味則能為膿為血種種雜穢注觸則能為畜為鬼為糞為尿注意則能為電為雹摧碎心魄罪報懺悔鼻根齅報招引惡果此齅業交則臨終時先見毒氣充塞遠近迷惑道路亡者神識從地涌出入無間獄發明二相一者通聞被諸惡氣熏極心擾二者塞聞氣掩不通悶絕於地如是齅氣衝息則能為質為履衝見則能為火為炬衝聽則能為沒為溺為洋為沸衝味則能為餒為爽衝觸則能為綻為爛為大肉山有百千眼無量咂食衝思則能為灰為瘴為飛沙礫擊碎身體罪報懺悔舌根味報招引惡果此味業交則臨終時先見鐵網猛𦦨熾烈周覆世界亡者神識下透挂網倒懸其頭入無間獄發明二相一者吸氣結成寒氷凍裂身肉二者吐氣飛為猛火焦爛骨髓如是嘗味歷嘗則能為承為忍歷見則能為然金石歷聽則能為利兵刃歷息則能為大鐵籠彌覆國土歷觸則能為弓為箭為弩為射歷思則能為熱鐵從從空雨下罪報懺悔身根觸報招引惡果此觸業交則臨