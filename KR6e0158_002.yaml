別修妄念存想固形遊於山林人不及處有十種仙較人為優比天為劣彼諸眾生堅固服餌而不休息食道圓成能駐孩童之顏能延百千之壽不得輕舉者名地行仙堅固草木藥道圓成飡黃精松栢上品藥物身輕冲舉者名飛行仙堅固金石化道圓成鍊九轉還丹尸解蟬蛻點石死汞往來人間者名游行仙堅固動止氣精圓成熊經鳥伸消息陰陽專氣致柔嗇精剉銳履空入冥者名空行仙堅固精液潤德圓成鼓華池吸沆瀣婥約若處子不交人欲者名天行仙堅固精色吸碎圓成吞日月精華吐固納新飲流霞服虹霓胞合光耀者名通行仙堅固呪禁術法圓成持呪入神禁蛇蟲無毒屍起能行呪水書符驅祟療病役使鬼靈者名道行仙堅固思念思憶圓成泥丸出神丹田養珠隔遠見物名照行仙堅固交遘感應圓成坎離配合金木調濟裁接陽生采取陰汞名精行仙堅固變化覺悟圓成見春榮秋悴覺化理綿密觀滄海桑田悟有力潛移名絕行仙皆不修三摩地以邪法鍊心別得生理壽千萬歲或住深山海島斯亦輪迴妄想流轉報盡還來散入諸趣之報懺悔勝心作福惡意行檀怒人之求帶恚而與施慧多瞋故得天福力而非天倫阿修羅趣之報懺除三界諸天之中以凡夫前身處人間世因於婬欲漸輕漸薄轉微轉無繇是報得妙身樂境修齡勝趣躭荒逸豫不覺無常五衰相現見生處不如苦惱逼心之報統懺隨順殺盜婬起輪迴性昏沈七趣諸有為相妄想受生妄想隨業經無量劫不識本心不得真淨之罪惟願了見自性達罪福相如湯消氷如鑪點雪不入諸趣徑登覺岸歸投調御加被攝受得如所願此八尊佛出菩薩藏經南無無憂世界月勝吉佛南無歡喜世界栴檀吉佛南無賢世界無邊光明佛南無饒益世界幢吉佛南無月光世界無憂吉佛南無有幢世界寶剎佛南無有鳴世界華德佛南無有月世界光明吉佛南無日輪光明勝佛南無普寶盖佛南無三昧勝奮迅佛南無寶俱蘇摩身光明勝佛南無最勝波頭摩奮迅勝佛南無無量香勝王佛南無金剛堅強消伏壞散佛南無電燈幡王佛南無東方藥師琉璃光七佛南無西方極樂世界三十六萬億一十一萬九千五百同名同號大慈大悲接引導師阿彌陀佛南無不誑一切眾生菩薩南無無量功德海意菩薩南無東方無畏佛國光明幢菩薩南無南方智聚佛國智勝菩薩南無西方智山佛國寂根菩薩南無北方那羅延佛國願意成就菩薩次復懺悔我等以憤驕之心躁競之念不懷忠孝不崇道德今身前世於祖父母父母翁姑家長不知感恩懷義不能承顏順志色養敬重忤逆不孝面則麤言牴觸背則惡語罵詈黑天悖理甚至舉手歐打平時不修定省溫清有疾不加按摩湯藥歸終不能盡禮殯塟歲時或缺祭掃墳塋乃至伯叔昆弟夫婦姑姨六親不和起諸怨結不信朋友不睦鄉黨不知禮義廉耻母女姊妹褻無道行藏偏頗買賣欺乖造言興訟傳播是非平空架揑破人身家倚勢強梁奪人妻女操戈入室德以怨酬忍入井而下石利其財而殺人刀筆舞文儓𨽻恐偈為臣不忠奉職無狀希功誤國裕己剝民伐異黨同進諛退直草管人命殺人媚人掊尅錙銖用若沙土或交煽敵國搆起兵端戎馬生郊生靈塗炭或戮良抵級殺降冐功或寄形泉石而捷徑終南託迹江湖而心懸魏闕或山人術士而挾制當衝蓮社竹林而譏評朝政末法季運僧尼沙彌殉利求名缺齋犯戒我相堅固忍力尠微侵損常住驅役淨人互用三寶財物私竊伽藍華果八種不淨儲蓄過多六種和敬自來無有以徂詐為權巧以狼貪為幹蟲傾險甚於俗子媚嫉過於妬婦入見儕輩有勝善事如釘入眼熱惱忿恨夢醒匪寧便起惡心肆加撓害一粥一飯不如其意即生異事報復於他不念剃度恩深法乳義重嫉師怨師毀師謗師嫌人嫌法慢慢過慢增上慢欺侮年高臘長虗消檀越信施詐現有德謬稱知識禪觀不修雜攬俗事鬬諍生端幸災起訟無因果謗方等大乘訶罵佛祖輕西方淨土假衣賴教邪命非為私心樹立私黨惡性追隨惡朋尅落為善錢財減削眾僧衣食指揑募化自飽箱囊毀售聖像販賣經典覆藏重罪隱匿瑕玼如獅子蟲為魔伴侶敗壞佛教減損法門如是耳磬目華獨知之地所作黑業或於現身受報或來生受報或後多生受報今仗三寶尊靈威德一切懺悔不敢萌作若定業難逃猶望轉重為輕成益頓超帶業往生無量壽國令諸冤家同得無生法忍上來懺悔前五識第六意識末那識阿賴耶識見思煩惱六根六塵十習因六交報七趣三報餘罪已竟身心內外皎如氷壺從今已去不經大小三災不生八難及無佛之世於佛法僧深加敬信見四聖諦理逆須觀悟十二因緣迴聲聞緣覺心立大菩提心發妙耳門得圓通本根入首楞嚴三昧一切事究竟堅固誓度眾生成等正覺於中修行奢摩他毗婆舍那三摩禪那於色陰受陰想陰行陰識陰洞達精明生因識有滅從色除不遭羣魔撓亂為細魔事魔境現前悉能諳識弗為惑動心垢洗除不落邪見陰魔消滅天魔摧碎大刀鬼神魄逃逝魑魅魍魎無復出生直至菩提無諸少乏不劣增進於大涅槃心不迷悶令此羣魔悟妄想因俱得道果以此功德善願佛法靈通在會臣民稽首虔誠嵩呼忭躍一心仰祝當今皇帝陛下萬壽萬安萬福萬祿萬天保佑萬神護持萬機之暇萬法歸一以一統萬萬事得理萬民安樂萬國來朝本技萬世祚亭萬億萬里塵清萬方寧謐五星順序五穀豐登五兵斂戢五教興行輔弼將相部寺百僚臺憲監司忠貞亮直郡邑臨民清廉公止高遷品秩弘護教門恒憶靈山之付囑永為佛法之金湯專為歸依大覺得如所願滿菩提願此七尊佛出千佛因緣經南無寶華琉璃功德光照佛南無寶燈焰王佛南無須闍提大善寂佛南無帝寶幢摩尼勝光佛南無寶蓋照空佛南無殊勝月王佛南無妙樂國歡喜莊嚴珠王佛南無寶華奮迅佛南無大光明佛南無寶藏佛南無無量寶佛南無身尊佛南無梵自在佛南無內豐珠光佛南無樹王豐長佛南無波頭摩勝世界賢勝佛南無鏡輪光世界月智佛南無莊嚴慧世界一切通光佛南無難過世界法光明波頭摩敷身佛南無過去無量無邊海勝佛南無諸根常定不亂菩薩南無諸根常悅菩薩經云俱生無明輪轉生死結根唯汝六根更無他物應當詳審煩惱根本發業潤生汝復欲知無上菩提令汝速證安樂解脫亦汝六根更無他物三世遷流四方定位世界相涉三四四三宛轉十二流變三疊一十百千總括六根各各功德有千二百依不變性具隨緣染淨二義逆順修行根塵對發四方各有三世三世各有四方就一方過現未過中復過現未現中復過現未未中復過現未及本法共成十從此乘起過去十現在十未來十又增三世各百每方三百四方共千二百以今懺悔六根惡業因緣所萃福利願我等從此眼根具足八百功德父母所生清淨肉眼見於三千大千世界內外所有山林河海下至阿鼻地獄上至有頂其中眾生及業因緣果報生處耳根周聽十方一切聲聞圓滿一千二百功德鼻根聞於五分法身種種諸香具足八百功德舌根宣揚妙法恒嘗上味圓滿一千二百功德身根如淨琉璃三乘賢聖說法世界眾生生死善惡悉於中現具足八百功德意根默容通達無量妙義治世語言皆順正法六趣眾生心所行動皆悉知之圓滿一千二百功德返流全一六用不行轉八識成四智去泥純水永斷根本無明萬行密因圓滿六波羅蜜三增進故單複十二善能成就五十五位真菩提路具足五根五力七覺支八聖道十八不共法三十七助道品圓寂涅槃清淨妙德如上禮佛懺悔覺悟功德更當發願迴向但凡夫洞視分寸隔紙膜而不見聰聆百步逾里井而弗聞莫知嚮方仰承教主本師釋迦牟尼佛深慈大悲聞示西方公案橫截直超法門為末世第一救度津梁依教信受尊敬奉持禮懺眾等一心歸命極樂世界阿彌陀如來我聞如來廣發四十八願莊嚴淨土普攝有情十方諸佛所共稱讚我今發菩提心觀念如來百福萬德十號三身於念念中仗如來力我及眾生有識至今罪惡怨對願悉滅除魔事潛消淨業成就巍巍金相燦燦寶池但作思惟隨意顯現十二時中寤寐靜散恒與如來光明交接常𫎇如來醍醐灌頂甘露洒心授我等持開我妙慧預知捨報正念安詳阿彌陀佛觀音勢至化佛菩薩寶幢珠盖天樂異香希光聖境徧滿虗空來至我所令諸眾生同得見聞喜踊感發遞相勸誘我時承佛垂手提接金登剛臺如彈指頃隨佛往生極樂國內勝蓮華中華開見佛即聞佛乘頓圓佛智得授佛記一時了達無量法門不捨萬行游行十方佛佛出現皆親奉事等密迹之保綏同梵王之勸請獲慶喜之總持興純陀之後供起舍利塔高至梵天弘大乘典住於劫盡住首楞嚴三昧於一念間分形散影徧應七趣以身充滿無量阿鼻等獄凡有苦具都集我身代諸眾生受其極苦令脫輪迴咸登不退如是三塗五濁經歷靡休六度四弘勇徤無息深誓如地藏精進如能仁證文殊智海入普賢行門具彌勒慈心滿觀音悲願亦如十方諸佛菩薩誓願迴向統以法界為一佛土必使六道業漏煩惱一切永盡二乘迴心盡菩薩行願盡佛出興盡涅槃盡乃至盡虗法界情器世間純成智正覺真如是際不生不滅不增不減不變不動不出不沒我願乃盡最後作佛有一不盡不取滅度我此願王廣大如法界究竟如虗空窮未來際不相捨離假使鐵輪旋頂五熱炙身誓不退墮仰惟韋䭾大士哀憐護助晝夜增長福不障道苦不忘修倘我力微業重德薄釁深見倒情迷反常異執菩薩善友亟生悲憫開諭呵責還得本心十方三寶證盟攝受南無東方滅諸怖畏佛南無南方日月燈明佛南無西方覺華光佛南無北方發功德佛南無東南方除眾慼冥佛南無西南方無生自在佛南無西北方大通王佛南無東北方空離垢心佛南無下方同像空無佛南無上方琉璃藏勝佛南無天上龍宮他方此界三乘五教十二分九部修多羅藏戒律藏對法藏一切經典南無他方此界塔廟伽藍天宮龍宮夜叉鬼神宮人王宮臣庶家堂所奉佛像菩薩羅漢像真身舍利一切形像南無准提佛母菩薩南無救度佛母菩薩南無訶利多辟支佛南無婆利多辟支佛南無西天東土宗教歷代祖師傳經翻譯三藏法師南無摩訶迦囉菩薩南無金剛亥母菩薩南無穢迹金剛菩薩南無密迹金剛菩薩南無金剛手菩薩南無摩利支天女菩薩南無護法護戒護諸伽藍塔廟擁護持呪護靜護人衛護國界影響權化諸天八部善神菩薩南無三洲感應韋䭾菩薩自歸依佛當願眾生體解大道發無上心自歸依法當願眾生深入經藏智慧如海自歸依僧當願眾生統理大眾一切無礙禮懺眾等再將功德分施各人先亡祖禰父母六親九族師友乘此良因在善道者增長天福處惡趣者解脫苦輪銷復六根止息三報觀罪性空照無明惑各悟本性彌陀俱生唯心淨土見佛聞法逮無生忍散週沙界有情齊成佛道在會善信歡喜奉行展轉勸導親友知識改過遷善人人悔悟各於半月半月修崇道場繼續懺法廣化有緣同圓種智虗空有盡懺願無盡至心頂禮三寶下卷繳懺意向上參究理懺決透疑關根塵識業已銷除現生後報俱清淨地獄粉碎業海枯乾刀山劍樹作香林鑊湯罏炭為池沼阿旁生善道刑措何施獄主坐蓮臺畫地不入轉識情而成智境變濁惡而化淨方俱霑十地光明同聽天皷說法鬼道絕饑渴畜類免戕吞盡此一報之微形咸悟三乘之妙理愧恧自責悔禍內慙放捨前世怨家種植未來道果今則禮懺眾信并及有情等行難行之善事懺難懺之惡條服甘露之妙樂入不死之壽十障二十二愚應念銷落刷結八十一使即時併除人法悉空斷常斯遣二邊刷盪慧日當天三漏陶鎔智鋒出匣現前無少物寂照一如當下出言詮是非雙泯七處徵心心已徹八還辨見見惟精轉物即同如來歇狂便登正覺因緣自然皆戲論合和離即示真常無狀忽生世界有愛遂為眾生斷殺盜婬絕業果色五濁澄靜十界混融一解六亡而圓通自在三義四律而秘密總持從前輕重罪障未及懺悔者如湯消雪末世破戒棄殘一聞法音者如風吹沙十二類盡入涅槃五十種皆為護法惡星凶煞年歲巡官保綏懺法助佑善人梵王天帝金剛藥叉默相國朝陰翊王度當道官員超遷優擢在會僧俗福集身安又為從來信為檀越施財所以施命受供實乃受恩伐為懺罪報答又酬天地覆載日月照臨祖師傳譯父母生鞠先聖先賢播種五穀設立房室製作衣服修置器用種種資生之具利益後代之恩培植生成統為禮懺報德初機僧行不修戒簡不閱律文安知持犯之條罔識昇墮之目因循遷就看面隨時將常住信施財物私竊公漁明典暗賣結納勢要滋潤俗親果報至重即食彼人糞之蟲尚墮地獄況受彼人物之輩厥罰可知咸為懺悔又眾生悖戾恩地修怨傾陷親友毀詈師尊縱逭王章終遭鬼戮并為懺謝水乳和同一切俱淨今茲道場所在穢汙陳設荒疎對越之際忽心思外緣諷誦之間乃意牽別事禮拜欠恭身衣弗潔庖厨未淨走使不虔所有乖張悉求懺悔凡心未兆聖智先通普賢王菩薩摩訶薩修次依楞嚴了義究竟事懺䟦語懺法度世仗以滅罪生善繇來尚矣而華嚴懺卷帙富愽彌月方竟不甚傳布法華懺金光明懺南中人目所未覩今之流通者梁法雲僧祐諸師以齊竟陵文宣王子良夢感所撰淨住子二十卷節為十卷即梁皇懺也南宋孝宗之世左街僧錄若訥摭取佛名經十五卷之文為水懺三卷觀夫兩懺詳略雖殊理無不該事無不盡無所容置喙矣然人心輕佻於祭祀之誠肅敬難久今梁懺竭蹶四日以屬倦怠中下之家以費鉅阻辦而水懺一日有拜三部者似乎繁簡未中釋禪既獲退居牟尼山止觀之際覺其根塵之宿業偏重思欲湔洗乃依楞嚴經修次懺法二卷四百餘拜終日可畢持以澡雪罪垢楷磨靈臺不敢輙以示人已而幡然曰此豈一人之私願乎遂聽徒屬抄寫夫有可廢之人無可廢之言誠能不賤近貴耳試熏修之未必不為淨土禪悟之助因也苟不當意置之也可懺終梵讚楞嚴懺慧日正當中究竟堅固事無窮六根虗妄罪俱空毫光示現紫金容解心結悟心宗法法盡圓通楞嚴懺悔十習六交根塵虗妄罪俱銷寶所信非遙淨土名標彈指即能超南無普懺罪菩薩摩訶薩直音悛佺躐列驟奏索色嚮向用鱍鉢攪狡睚眦愛寨轇轕交割顰貧蹙促瀛銀渤孛糲辢羶山乩稽儓臺獦歇禪位上善鬻育羸雷攣鑾跛波上聲菅間蓏裸恧農入聲溷混絫累同囂梟滌狄稊提蠡禮噍醮楫節矚竹繄意濯卓蘧渠酷哭嗾湊暍謁鏖敖憊拜盻判村用塪坎靚淨蒨茜遏阿蝤酋蠐齊蛻退蛤古沓切蜃瞬暈運玦决燐林顓專騃岩璅蛣早吉𧕍矴營丁蠮螉噎翁腊昔戢怎入聲鬬豆殂芻擻叟潬旦蝡軟斫斫傞渴蹉崦壜弇曇魄堆上聲研年煠扎鉞月酖正礰力磑外捺衲𢫫六迸蚌崩去聲愗貿綻站矟朔撞壯剚事射石鉗虔剮寡懾業襍匣業魃薄林鯷提能奴來切𧣙袞𩲝謎𩳸苗祟歲崔委蛇下儀𧝞機砧珍君要佷恒上聲綮頃慶二音樗上平聲踶提尸解下假嗇色瀣戒𡝭妹物冐三音今從妹儕柴褫耻謐密
