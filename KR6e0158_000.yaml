body:
  text: 依楞嚴究竟事懺卷上凡熏修楞嚴究竟懺法不須別作佛事不必申奏表牒不用金銀錢袱不動鐃鈸雲鑼但當延名僧善士朗誦懺文靜觀罪性觀想佛象至誠禮拜必致感應夫水清月現鏡淨像生克念在我無有不如願者矣一隨力陳設佛像菩薩像羅漢像諸天護法像淨水淨茶淨鏡名香燈燭時華時果時蓏三德之飯六味之蔬凡室中所有珍寶妙物鮮潔段帛悉要列供不可隱細用粗匿新使敝先誦大佛頂首楞嚴呪結界次嚴淨祝讚次開啓懺法上卷入懺啓白切以塵寰滾滾業海茫茫最初不覺忽起無明始從法界分流遂至隨緣泪沒奔趨逐境各不相知界則成住壞空心則生住異滅五蘊蓋覆五欲恣荒念慮飄忽如空中之遊塵動作輕狂似海中之波浪繇是依心起法見境生情六道之輪回不息七趣之形狀無涯空散銷沉悉具如來德相飛行蠢蠕俱稟善逝靈知天宮多樂人道難生芥投針孔其中之風雨最艱龜值浮槎此際之狂瀾非易雖三因三緣之已具而七七十月之罕成住胎出胎受苦萬狀三周九歲疾疹多般既有夫婦之偕便嬰男女之纍紛飛心緒勞碌形骸著我耽人愛美憎惡世法濃染等膠漆之粘連情欲纏綿若魚水之轇轕趨時胃險害他保身為利殺牲以錢網肉但知養其口體不念殃及無罪錨銖是爭睚眥必報一生顰蹙開口之笑希逢畢世熬煎稱意之事能幾官高爵厚寵辱若驚庫溢倉陳得失尤患夭橫疾病衰朽龍鍾林林而生泯泯而死當捨壽時生龜脫筒徒盼難割之骨肉空牽苦積之田財惡業冤讐追尋不釋結習煩惱貼體不離非入火鑊刀山定配披毛戴角是以大覺出世迷人之大夢喚回聖教流傳季葉之苦輪可息開慈悲法眼憫弱喪窮途罪惡已搆何能自拔泥犂福善續為庶得贖其過咎地跌還從地起心造要以心除闡懺悔法門度沉淪苦類今者禮懺衆等何幸預修從此改過圖新懼罪遷善焚香散華設像禮拜千年積暗燃一燈以破除萬劫重迷聆片言而領悟前念著境後念遠離邪見銷鎔正信牢固有漏有為空華水月能覺所覺谷響乾城達罪性之本空入唯心之識定我衷耿耿聖鑑昭昭伏願不逢惡友不遇惡緣不發惡言不起惡念善業純熟善果圓成善法行持善人接引星辰順旺運限亨通四時吉利營求果遂其心百歲康寧福祉介萃於體諸天擁護魔怪潛藏不作十習之因不受六交之報直往菩提徑登彼岸更願人人悔悟物物豐饒政教化成雨暘時若無龍鬬蛟起山崩岸圻之災無地動水立屋倒舟沉之患無兵戈之釁無飢饉之虞無疫癘蟲蝗無盜賊姦宄玉燭恆調金甌永固萬方普順於一人四夷遵行於十善各保疆字共樂升平不為尤物所移不被宵人所誘不至暴珍天物不敢違逆天心報應如影響因果如瓜豆理必填還事無差爽俱懷恐懼同修懺悔深省無常苦空期獲常樂我淨虔誠啓白智照證盟開懺偈得成菩提降伏魔宣説佛名懺悔法三千諸佛繇此興我今諦信願如是
