body:
  text: 南中雞足山悉檀寺沙門釋禪修述大衆至誠心建立懺悔法嚴淨結壇場香華為供養當發深淨信信佛語教導先敬禮三寶後各自陳意無始至於今三業十惡罪六根為賊媒自劫家中寶五陰主人迷隨妄想流轉妄取諸塵境妄入六趣中知妄即當離幻離成正覺悔悟必悛改當觀罪性空若欲懺悔者端坐念實相如日照虗空如燈然暗室見真如法界潔淨離垢染從此極未來同一切衆生俱得白淨法速成菩提道開啓楞嚴究竟懺法一心頂禮南無盡虗空遍法界十方三世塵塵剎剎帝網無盡常住佛陀耶一唱一和拜下同南無盡虗空遍法界十方三世塵塵剎剎帝網無盡常住達麼耶南無盡虗空遍法界十方三世塵塵剎剎帝網無盡常住僧伽耶華嚴經行願品普賢菩薩告善財言善男子言懺除業障者菩薩自念我於過去無始劫中由貪瞋癡發身口意作諸惡業無量無邊若此惡業有體相者盡虗空界不能容受我今悉以清淨三業遍於法界極微塵剎一切諸佛菩薩衆前誠心懺悔後不復造恆住淨戒一切功德如是虗空界盡衆生界盡衆生業盡衆生煩惱盡我懺乃盡而虗空界乃至衆生煩惱不可盡故我此懺悔無有窮盡念念相續無有間斷身語意業無有疲厭觀藥王藥上經云釋迦牟尼佛告大衆言我曾往昔無數劫時於妙光佛末法之中出家學道聞是五十三佛名心生歡喜復教他人展轉聞持至三千人敬禮諸佛因緣超越無數億劫生死之罪初千人為華光佛至毗舍浮佛於過去莊嚴劫成佛中千人為拘留孫佛至樓至佛於現在賢劫次第成佛後千人為日光佛至須彌相佛於星宿劫當得成佛佛告寶積十方現在諸佛善德如來等亦得聞是佛名故各皆成佛若有衆生欲得除滅四重禁罪欲得懺悔五逆十惡欲得除滅無根謗法極重之罪當勤禮敬五十三佛名號三聚經云諸佛在世當慈念我若我此生若我前生從無始生死以來所作衆罪若自作若教他作見作隨喜若塔若僧若四方僧物若自取若教他取見取隨喜五無間罪若自作若教他作見作隨喜十不善道若自作若教他作見作隨喜所作罪障或有覆藏或不覆藏應墮地獄餓鬼畜生諸餘惡趣邊地下賤及蔑戾車如是等處今皆懺悔所有善根回向阿耨多羅三藐三菩提今此在會僧俗信善男女欽遵聖教起深淨信俱發菩提心設像作法熏修懺悔法門諦觀無生真理涅槃經言有二健兒一不作罪二作已能悔然我等久在凡夫地生心起念動身發語無非罪過何能不作惟是積迷稔惡深習厚染無勇健心不知悛革所以輪回六道莫繇自拔今者何幸得遇懺法正是作已能悔之時梵語懺摩此云請忍亦云悔過就此而言則知獲罪三寶天龍父母師長同壇尊臘便當懇請忍受寬耐慈悲解釋宥恕我罪容我懺謝至於一切自作自受負命負財明搆陰謀欺昧難測等罪尤當警惕心慮鞭策六根發七種心懺三種障興慚識愧尅責內省痛加改悔矢志圖新後不復造繇此一念惺悟怨艾之明乘三寶力頓使從前罪狀霧散氷消怨解讐釋各發善念共趣道場先懺十種順生死心以為所治一妄計人我起於身見二內具煩惱外遇惡緣我心增盛三內外既具滅善心事不喜他善四縱恣三業無惡不為五事雖不廣惡心遍布六惡心相續晝夜不斷之覆諱過失不欲人知八虜扈抵突不畏惡道九無慚無愧不懼凡聖十撥無因果作一闡提從無始來無不皆爾今當回心發善逆生死流順涅槃道且惟狂克念作聖唯迷省悟為覺在理灼然易於反掌各宜發誠信心除疑惑想切勿執著世説辜負己靈覔頭奔走為迷中之倍人開眼昏沉作醒時之醉漢良以聰明之士忽略無常志氣逸越不念登高繇卑行遠自邇徒欲驟躐崇臺絶塵天表究竟實際空過一生既知其失相與躬行力踐寶所非遙各自努力身口意業精一至到不知其它惟見巍巍相好如來舉體光明慈容怡悅與我自身非一非異充滿虗空我今五體投地盡禮無餘感應道交桴鼓不爽普為一切衆生歸依無量無邊大慈悲父於佛名經菩提流支譯本略出南無過去毗婆尸佛南無尸棄佛南無毗舍浮佛南無拘留孫佛南無拘那含牟尼佛南無迦葉佛南無本師釋迦牟尼佛南無當來彌勒佛南無楞嚴會上寶光留照十方微塵數諸佛南無五十三佛南無三十五佛南無百七十佛南無過去莊嚴劫千佛南無現在賢劫千佛南無未來星宿劫千佛南無東方阿閦佛南無南方普滿佛南無西方無量壽佛南無北方難勝佛南無東南方治地佛南無西南方那羅延佛南無西北方月光面佛南無東北方寂諸根佛南無下方實行佛南無上方無量勝佛南無文殊師利菩薩南無普賢菩薩南無觀世音菩薩南無得大勢至菩薩南無常隨佛學一千二百五十五大阿羅漢楞伽經云藏識海常住境界風所動種種諸識浪騰躍而轉生解深密經云阿陀那識甚微細一切種子如瀑流首楞嚴經云陀那微細識習氣成瀑流阿毗達摩經云繇攝藏諸法一切種子識故名阿賴耶勝者我開示則知此識體即如來藏以其受熏持種是生死之根本若離念清淨乃涅槃之正音繇夫真如隨緣不生滅與生滅和合妄見根身器界善惡好醜起惑造業隨因受報法身輪轉於五趣故名衆生雖摩尼珠不為垢染而久沒污泥當以方便索出譬諸澄水磨鏡漸見清明登金剛道普照十方成此大事因緣不枉丈夫眉宇脫一念相應從緣悟入猶有無始種現習氣亦須併淨各當自陳自訟應觀外四大造色為器界內四大造色為根身從曠劫來繇眼耳鼻舌身意六根貪色聲香味觸法六入依根發識識能了別假名為心所謂心者非身內之赤肉團乃精神靈妙集諸種子起現行故能熏積諸法種故能緣慮自分境故繇是依心王起法與心相應而繫屬故曰作意於所緣境警令心起引之趣境觸境為性領納違順生歡戚相取像施設造作思惟貪於樂具嗔於苦具恃己慢他不明無慧疑豫諦理如六羣之黨邪顛倒見計若六師之習偽抱忿懷恨追惱憶惡隱覆欺自每懊悔不安矯詐罔他恆諂順非實憍一技而傲物報微忤而害人聞他榮善則萬箭攢心見有義為則一毛傷體不耻私犯寧顧惜於羞慚遑恤公評罕芥蒂於愧恧豈信德業為身之四維恣行不簡何知勤慎為道之三寶懶軟無條放曠六根損障三善居諸瞢懂惟溷濁於昏沉積絫輕浮特囂煩於掉舉其正念則健忘其惡慧則流注耽睡眠而情甘暗劣樂非禍而自陷刑章尋求獷以匆遽乎名言伺察細微以潛幽乎意思別別觀境數數取趣帶質無質見分相分法我人我執非謬之度量能緣所緣實染淨之依附獨頭獨影孰測心境之端倪去後來先難作死生之主宰是以出沒三塗循環六道何業不造何類不遊或受山峰之巨身或賦遊塵之眇質惡多善少樂短苦長今者幸獲人身隔生失憶苟知宿命恐懼靡寧從茲已去各帶無常未卜作何面孔必冀勝於今生能秉此志急宜改圖願與一切衆生若親若怨若幽若顯若徵若著四生九類自有識神已來無明所覆結使所纏煩惱所亂蘊蓋所遮搆有形之冤對愈大海之波瀾締無相之愆尤等太虗之涯際直須從前洗滌徹底掀翻如割髮及膚剪爪侵體至誠真切説己罪名面對聖容哀受我悔一時澡雪相與五輪著地懇禱禮拜如來所知十方三世大慈悲父南無六十功德寶佛南無六十二毗留羅佛南無八萬四千自在幢佛南無三百大幢佛南無五百淨聲王佛南無五百波頭摩王佛南無五百日聲佛南無五百樂自在聲佛南無五百普光佛南無五百波頭摩上王佛南無七百法光莊嚴佛南無千法莊嚴王佛南無百億微塵金剛藏佛南無三萬散華佛南無三萬三百稱聲王佛南無八萬四千阿難陀佛南無千八百寂滅佛南無五百歡喜佛南無五百威德佛南無五百上威德佛南無五百日王佛南無千雲雷聲王佛南無千日熾自在聲佛南無千離垢聲自在王佛南無千勢自在聲佛南無二十五圓通菩薩南無地藏菩薩南無虗空藏菩薩南無金剛藏菩薩南無解脫月菩薩經言世界無邊衆生無量前際無始後際無終今此所居中國不啻梯米之在太倉前此受過身形亦逾野馬之飄廣莫則知已成諸佛微塵數極微塵數將成諸佛恆河沙盡恆河沙目前新新不住念念遷流剎那剎那生滅生滅吾猶昔人非昔人見雖不皺面已皺撫躬循想既往晦昧良用愓然夫絶不知三細六粗安能斷九地九品攀緣彌久擾動益加力難砥柱中流惟任奔波東逝山川非險天道易知覆雨翻雲亂朱變白陽善陰惡面是背非陰符揣摩縱橫名法蘇張范蔡種蠡孫吳蓄留侯之奇謀用曲逆之祕計殘忍莫讓於白起慘毒無殊於商鞅或假仁義而盜名或飾忠貞而竊國或強食弱肉以衆而暴寡或貶善褒惡舉枉而措直反常乖理而不納良規倒行逆施而罔遵聖訓屠城則不遺噍類竭澤則靡棄小鮮赤人之族必覆其巢奪人之位終絶其祀下而蒸上疏而間親不別爪李嫌疑常遊華柳街巷廟中梁下甘為焚溺之夫車上草間遂作奔淫之婦泣魚字鳳之流分桃斷袖之輩污穢淨地瑕玷貞閨訕謗名流誣揑高德未見説見不知言知詐發盟誓罔知句句自酬刻意呪詛莫悟念念自害以利網利惡求多求非分相干出位慕外抱病不肯悔猶肆貪叨臨危弗之覺尚冀遐算種種愛情色色染著見煙知火落葉知秋人所曾為誰不行過紅塵滾滾那有出世之途黑海漫漫竟乏度脫之楫繇是大雄大覺盡見盡知興慈運悲濟苦與樂示教利喜指為善之階梯開示悟入矚進道之捷徑設八萬四千法門破八萬四千煩惱委説詳陳耳提面命我等稍知嚮往良心痛悔發露自鳴勢難藏覆如日中不能逃影鏡裡未可匿形所有業根應念鋤拔疏淪心志稽首歸依四生慈父南無千功德蓋幢安穩自在王佛南無十千迦葉佛南無千遠離諸怖聲自在王佛南無千無垢聲自在王佛南無二千寶幢佛南無八千堅精進佛南無八千威德佛南無八千燃燈佛南無十千清淨面蓮華香積佛南無二萬億威音王佛南無十千莊嚴王佛南無十千星宿佛南無一萬八千娑羅王佛南無一萬八千普護佛南無三千毗盧舍那佛南無三千放光佛南無三萬日月太白佛南無六萬波頭摩上王佛南無六萬能令衆生離諸見佛南無六十百千萬成就義見佛南無無量百千萬名不可勝佛南無具足四無礙智菩薩南無常憂念一切人菩薩南無於一切國土普現莊嚴藏菩薩南無常持至誠菩薩南無善財菩薩蓋惟中朝恩命重罪輕罪已發未發逢赦悉原華嚴經四句偈能破地獄金剛經為閻羅殿前赦書金光明經懺悔能壞諸苦盡不善業是知懺悔法門真渡海浮囊破暗明炬其通韻達識自當渴奉服膺奚俟曉勸應知從無始來用諸妄想顛倒行事自取流轉不知此心活鱍鱍地離塵出指妄推在內在外在根在中昧空結色遺本迷還別業妄見背覺合塵所覺所明立同立異擾亂生勞渾濁成惱晝夜思想念念不停於中善念恆少惡念恆多事即未行幽對冥搆憶善受勝報思惡自沉淪何況明為顯作安能條列縷指以吾人一圓融清淨寶覺六織妄成見不超色染於黑白妖妍聽不出聲惑於鄭衛歌樂嗅不越香溺於脂粉麝檀嘗不絶味嗜於海陸血肉覺不離觸悅於細滑柔美知不踰法攬於世智小慧同業相纏合離成化色發想成異憎同愛交遘吸引細想入胎一七日名凝滑二七名皰三七為軟肉四七為堅肉五七曰形位於是名色六根悉生一切衆生皆以淫欲而正性命結愛纏想父母子孫血脈傳續種類不斷貪染不止口體所資因依飲食弗能茹蔬甘淡惟嗜肥脆腥羶遞相吞噉彼此酬還今羊之力弱初未嘗將己身捨與人食被人以強不與而取以供庖厨於他身命財非理侵奪殺乃兼盜負命責債物之膠漆故生死不已愛心憐色情之魚水故纏縛無休根本輪回業果相續緊基乎此於中微瑣過犯惟諸佛菩薩悉知悉見齊諸佛菩薩所知所見願以大悲水浣濯令淨容聽懺悔歸命十力慈父南無二億拘鄰佛南無三億弗沙佛南無六十億大莊嚴佛南無八十億實體法決定佛南無六十億娑羅自在王佛南無十八億日月燈明佛南無百億決定光明佛南無四十億那由他妙聲王佛南無二十百億雲自在王佛南無百億釋迦牟尼佛南無二十億怖畏聲王佛南無億千樂莊嚴佛南無六十頻婆羅遠離諸怖畏佛南無億那由他百千覺華佛南無須彌山微塵數一切功德山王勝名佛南無十方佛國土不可説億那由他微塵數普賢佛南無初發心念斷疑發解斷煩惱佛南無東方善德佛南無南方寶相佛南無西方普光佛南無北方相德佛南無東南方網明佛南無西南方上智佛南無西北方華德佛南無東北方明智佛南無下方明德佛南無上方香積佛南無師子遊戲菩薩南無師子奮迅菩薩南無師子幡菩薩南無師子作菩薩復次懺悔人處無常苦空世間俱是旅洎幻化生不滿百年每作千歲之計執著情見堅固我相所以苦惱至重禍患極多朋友凋而不省親戚逝而不覺前代江山古時田産閲人已多不過蘧廬今暫得之勢為長久之物每事患失百方致力保持豈知天地虗空在吾妙明心中如片雲點太清裏惟認一浮漚體窮盡瀛渤如來説為可憐愍者茲當懺除諸苦難以枚舉且以簡册所載耳食目繫顯著明白表暴一二仰憑聖鑑懺除閻浮提內中國外正朔閏位人主嗜殺不殺不樂殿省羣臣脅息重足得保一日如度十年之苦懺除或以諫殺以才殺以詩文殺犯忌諱殺權重殺名重殺之苦懺除讒殺妬殺誣殺誤殺酷吏希旨羅織告蜜殺嗾引賢能牽逮忠正無干良善株連族殺之苦懺除骨肉相殘兵連禍結諸王樹黨逼遷乘輿殺人盈城血流漂鹵之苦懺除中原失鹿日尋干戈九州分裂一十六國戰爭之苦懺除強臣制主威權日去心腹黨與布滿宮庭起居呼召動加防簡遂至總百揆加九錫移祚禪位願後身不生王家求為黔首而不可得之苦懺除誅鋤豪傑禁錮英叉放逐賢良降黜民望之苦懺除常侍軍容怙寵專權幽君殺直肆雪天下一旦禍發誅戮殆盡之苦懺除賣官鬻爵賄賂公行貪官墨吏枉法取財刻核少恩雪民吸髓刺史滅門縣令破家之苦懺除盜賊充斤截路劫搶抄掠鄉村驅虜人畜之苦懺除暴斂橫賦間架科鏹落地打稅空身入市索錢之苦懺除征伐不息運輸滿道之苦懺除因田出卒計口抽丁父子乖離夫婦絶呌蠻煙瘴海虜塞胡沙千去不一回死作他鄉鬼之苦懺除宵征靈宿之苦銜枚疾驅之苦失道落巖穽苦無水飲馬尿苦寒墮指苦喝喘斃苦甲胄生蟣虱苦兩軍對壘苦偷營劫寨苦塘報偵探苦𢬵命鏖戰苦流矢飛炮苦臨陳殺戮苦敗北奔逃苦戎馬踐踏苦矢集於目金傷於體求生不得求死不得之苦懺除攻城苦圍困苦三斤黃金貿不得三升米苦食草根樹皮盡食革履韋帶盡銼薦席盡茹毛氈盡易子而食析骨而炊之苦懺除稱賣人肉苦眼見妻子被兵牽去殺食不能護止之苦羸弱疲憊猶持兵上城鬬戰苦盻望救兵至一日如過三秋苦滿城相食垂盡苦懺除聚人為量暴人為臘想人之肉納人於臼或名燒把火或名不美羮或謂兩腳羊或謂和骨爛之苦懺除殭尸積野臭穢熏天苦白骨堆山收葬無人苦懺除大兵之後飢饉凶年之苦瘟疫傳染聞氣即中比屋皆空之苦懺除珠玉黃金滿市而無斗粟之苦懺除十年九潦苦八年七旱苦過時不雨苦久雨不霽苦蟲蝗蔽天食禾稼苦氷雹惡風落穀實苦懺除河決海嘯衝沒郡邑店之苦懺際回祿為災延燒閭閻灰燼之苦懺除官商舟楫遭遇旋風雪浪沈溺之苦懺除惡心邪見斷善滅性折寺壞塔毀像殘經當墮地獄之苦懺悔鞭拷僧尼辱罵沙門嘲弄緇流誣謗淨行當入惡道之苦懺悔見人飢寒不肯周給呌街行乞不肯施與慳惜加毀當墮餓鬼之苦懺悔破和合僧訾議戒律攪散齋會阻廢善事毀壞功德林成就阿鼻獄之苦懺除運限命宮讐星凶曜五行尅伐衰病死墓年殺月災時日刑沖官符疾厄太歲陰府災退空亡闌于大耗四時邪氣四大增損之苦懺除沉痾痼症久臥床席療治不瘥之苦懺除異病怪瘡皮骨連立膿血淋漓腥惡難近之苦懺除羇人旅館客子天涯槖金既盡貂裘復敞干謁無門乏資身之䇿雲霄失路絶援引之人落魄他鄉難歸故里之苦懺除遊學之士行腳之僧冷寺荒村隻身吊影嬰纏疾恙痛楚呻吟更無湯藥醫療那有親朋看顧之苦懺除痘疹苦短命苦貧窮苦下賤苦盲聾苦瘖啞苦形體不全苦手足攣跛苦眇苦矬苦寒苦熱苦飢苦渴苦衣服飲食粗糲不充之苦懺除犯法苦遭刑苦流徒苦獄囚苦懺除懷孕苦墮胎苦産難苦倒生苦分娩不出苦胞衣不下苦懺除深宮望幸怨閫思夫嫁娶愆期鰥寡孤獨之苦懺除被人宮割苦自去勢苦自縊苦自刎苦自服毒苦投淵赴井苦懺除怨家下毒苦讐人行刺苦懺除虎豹摶噬苦蛇蠍嚙螫苦懺際土石山崖坑塪堆阜高下不平荊棘毒藥穢惡充滿之苦舉人間依正一切戕害苦楚自今日始承三寶力槩與蠲除永不逢受敬禮大慈悲父南無東方蓮華最尊佛南無南方功德寶佛南無西方大光普遍佛南無北方無量功德莊嚴佛南無東南方能壞一切暗佛南無西南方心平等佛南無西北方大神通王佛南無東北方心同虗空佛南無下方寶優鉢華佛南無上方大名稱佛南無金輪熾盛光王佛南無孔明王佛南無四十億那由他同名妙聲佛南無千同名功德蓋幢安穩自在王佛南無六千億同名堅修柔軟佛南無七千同名法莊嚴王佛南無藥王菩薩南無藥上菩薩經云從無始來至於今日不識諸佛及父母恩不解善法造作衆惡自恃種姓及諸財寶盛年放逸作諸惡行心念不善口作惡業隨心所作不見其過凡夫愚行無知暗覆親近惡友煩惱亂心五欲因緣心生忿恚不知厭足故作衆惡親近非聖因生慳嫉貧窮因緣姦諂作惡繫屬於他常有怖畏不得自在而造諸惡貪欲恚癡擾動其心渴愛所逼造作衆惡依因衣食及以女色諸結惱熱造作衆惡身口意惡所集三業或不恭敬佛法聖衆以無智故誹謗正法不知恭敬父母尊長愚惑所覆驕慢放逸千劫所作極重惡業志心懺悔悉皆滅盡諸佛世尊有大慈悲當證微誠哀受我悔若我百劫所作衆惡以是因緣生大憂苦貧窮困乏愁熱驚懼怖畏惡業心常無劣在在處處暫無歡樂我之所有煩惱等垢惟願現在諸佛世尊以大悲水洗除令淨過去諸惡今皆懺悔現所作罪誠心發靈所未作者更不敢作已作之罪不敢覆藏身業三種口四意三惡業受報六趣險難誠心懺悔遠離十惡修行十善安止十住逮十力尊我及衆生諸根毀壞悉令具足病苦羸瘦悉令解脫若受鞭撻繫縛枷鎖愁憂恐懼擾亂其心臨當刑戮無量怖畏諸苦惱等悉得解脫飢得美食渴得甘飲盲者得視聾者得聽啞者得言裸者得衣貧窮之者即得寶藏倉庫盈溢無所乏少衆生相視和顏悅色他人善事隨喜讚成願諸女人皆成男子智慧精進行菩薩道不適意報願悉滅盡割裂愛網破三有獄至大涅槃身心安樂懺悔發願已歸命禮三寶南無東方破疑淨光佛南無南方無憂功德佛南無西方華嚴神通佛南無北方月殿清淨佛南無東南方破一切暗佛南無西南方大哀觀衆生佛南無西北方香氣放光明佛南無東北方無量功德海佛南無下方斷一切疑佛南無上方離一切憂佛南無龍種上尊王佛南無龍自在王佛南無寶勝佛南無覺華定自在王佛南無袈裟幢佛南無師子吼佛南無琉璃金山寶華光照吉祥功德海佛南無善眼劫七十二那由他佛南無善見劫七十二億佛南無淨讚歎劫一萬八千佛南無善行劫三萬二千佛南無莊嚴劫八萬四千佛南無金剛幢菩薩南無蓮池海會阿跋致一生補處上善菩薩南無信相菩薩南無無比菩薩南無常不離世菩薩南無無邊身菩薩次復懺悔人間八苦所謂衆苦依止名曰生苦無明潤業不淨受胎增長出胎良賤男女端正醜陋又能令變壞名曰老苦念念消息終至滅壞力不能挽徒有嗟嘆又四大不調名曰病苦身則四百四病逼惱不安心則愁戚攀緣飛越不止又能滅諸根名曰死苦雖時節代謝或惡對招尋或業報卒至有福無命祿盡難存九種枉橫無量外緣又非愛共聚名曰怨憎會苦讐人怨家為親為友相謀相害生隙生嫌苦心領於苦境好意不成好緣又可愛相違名曰愛別離苦慈親孝子嬌妻嫩兒難兄難弟可意悅心無常奄至一旦乖背摧碎肝腹痛徹骨髓銜悲殮殯再會無期又希望不遂名曰求不得苦貧則求富窮則求通愛欲久持惡欲速往美名歸己好爵自縻尤物頻獲奇珍獨有田連阡陌谷量牛馬致力營算乖心違慮不得稱遂怨天尤人又總衆苦相名曰五陰熾盛苦能蓋覆心種種趣境積聚蘊結不能照了交煎煩熱斫性喪真然諸苦所因淫欲為本四十二章經云賴有一矣實為輪回敗道之本要知己身他身五種不淨一者生處不淨是身為臭穢不從蓮華生二種子不淨是身種不淨父母邪想有三自性不淨四大不淨聚海水洗不潔四自相不淨常流出不淨如囊盛穢物五究竟不淨諦觀於此身終必歸死處雖復觀粧艷美蒨笑巧媚直是滿腔膿血䏺脹穢惡白骨狼籍智者無為溺愛陸沉若能輕淡一分便是生天之捷徑禪智功德繇之而增有生實苦大患所叢既知此已相與懺除敬禮大慈悲父南無東方無量離垢佛南無南方樹根華王佛南無西方蓮華自在佛南無北方金剛能破佛南無東南方悉檀義勝佛南無西南方金海自在王佛南無西北方無邊自在王佛南無東北方無礙香象王佛南無下方無礙慧幢佛南無上方甘露上王佛南無寶世界善住力王佛南無十方上首世界起月光佛南無龍王世界上首佛南無善住世界善高聚佛南無無怖畏世界作稱佛南無受香世界斷諸難佛南無純陀菩薩南無高貴德王菩薩南無救脫菩薩南無網明菩薩經云身中堅濕暖動分為視聽覺察從始入終五疊渾濁如土投水容貌泪然空見相織名為劫濁身根相摶名為見濁根境相緣名煩惱濁惑業相趣名衆生濁性用相岐名為命濁分為根識粘湛發性六為賊媒自劫家寶積生虗習生住異滅分劑頭數流逸奔馳明暗動靜通塞恬變離合生滅如是十二諸有為相畢竟同中生畢竟異六結已成是非鋒起心性狂亂知見妄發發妄不息勞見發塵目睛若勞狂花亂起山河大地生死顛倒皆即狂勞不知解結當於結心何能一亡除其塵相未解即事捨於塵勞惟有隨流任其飄沒破犯三決定義違遠大毀槃城夫攝心名戒淫機一動則心不可收塵不可出落愛見坑失菩提路蒸沙作飯因果非倫又慈心名戒殺機一起則傷害必多惡不可止過三寸之舌頭填一時之溪壑斷佛性種子長三塗業根怨家債主伺隙追隨苦海茫茫理難度脫避溺投火事不應為又止足名戒盜機一潛則偷心勃發姦名犯義期己惑人澌滅真誠喪夫淳善方便盜呪盜人物及鬼神有主劫賊物一針一草欲求滅罪如水灌漏巵又實語名戒我等凡失無聖言量往往説謊時時造妄欲尊勝於己則無善不歸欲抑劣於人則靡惡不往人糞刻為栴檀噬臍終莫能及刀斷多羅之木永殞善根口惟衆罪之尤受苦偏甚又經毀犯比丘四波羅夷法十三僧伽婆尸沙法二不定法三十尼薩耆波逸提法九十波逸提法四波羅提提舍尼法一百衆學法七滅諍法及比丘尼八波羅夷法十七僧殘二不定法二百八尼薩耆波逸提法八提舍尼法一百衆學法七止諍法又毀犯菩薩波羅提木叉十重波羅夷戒四十八輕垢戒乃至三千威儀八萬細行及破沙彌十戒優婆塞優婆夷五戒無覺無明故犯誤犯相與懺悔既往之愆重淨重得立志不續未來之釁永斷永除歸投無上大慈兩足世尊願賜證盟功德南無清淨光世界積清淨增長勝上王佛南無普光世界普華無畏王佛南無普蓋世界均寶莊嚴佛南無相威德王世界無量聲佛南無名稱世界須彌留聚集佛南無善住世界虗空寂佛南無地輪世界名稱力王佛南無波頭摩華世界種種華勝佛南無種種幢世界須彌留聚佛南無一切善蓋世界遠離諸怖毛竪佛南無賢世界栴檀屋佛南無賢慧世界合聚佛南無寶首世界羅網光明佛南無安樂首世界寶蓮華勝佛南無稱世界智華寶光明勝佛南無賢臂世界起賢光明佛南無無畏世界滅散一切怖畏佛南無彌留幢世界彌留序佛南無遠離一切憂惱障礙世界無畏王佛南無法世界作法佛南無善住世界百一十光明佛南無共光明世界千上光明佛南無多伽羅世界智光明佛南無香世界寶勝光明佛南無八千無我甘露功德威德王劫佛南無妙光菩薩南無金剛慧菩薩南無常精進菩薩南無閻浮提自在王菩薩經云妙性圓明離諸名相本來無有世界衆生因妄有生因生有滅從畢竟無成究竟有此有所有非因所因住所住相了無根本本此無住建立世界及諸衆生迷本圓明是生虗妄熏以成業同業相感故有衆生顛倒是有所有分段妄生無住所住遷流不住故有世界顛倒三世四方和合相涉變化衆生成十二類心動有聲心生有色六亂妄想窮十二變為一旋復卵生胎生濕生化生有色無色有想無想若非有色若非無色若非有想若非無想繇八萬四千煩惱感變區分相與懺悔遷流之世分段之界乘此世界業果相生虗妄輪回動顛倒故和合氣成八萬四千飛沉亂想如是故有卵羯邏藍依殼而起流轉國土魚鳥龜蛇其類充塞罪報懺悔世界雜染輪回欲顛倒故和合滋成八萬四千橫竪亂想故有胎遏蒲曇含藏而出人畜龍仙等類罪報懺悔執著輪回趣顛倒故和合暖成八萬四千翻覆亂想故有濕相蔽尸假潤而興含蠢蠕動蝤蠐蚊蚋等類罪報懺悔變易輪回假顛倒故和合觸成八萬四千新故亂想故有化相羯南無而忽有轉蛻飛行蛤雉蜃等類罪報衆等共知此報隨念而受悚懼惶恐歸投五眼六通三明八解大慈悲父南無成就一切功德善住世界稱親佛南無憂慧世界遠離諸憂佛南無成就一切勢力善住世界稱堅固佛南無稱世界起波頭摩功德王佛南無華俱蘇摩住世界善散華幢佛南無十方名稱世界放光明普至佛南無炎慧世界放炎佛南無吼世界十方稱名佛南無光明世界自在彌留佛南無寶光明世界大光明佛南無常歡喜世界炎熾佛南無有世界三界自在奮迅佛南無無畏世界放光明輪佛南無常懸世界衆寂勝佛南無波頭摩主世界無盡勝佛南無普吼世界妙鼓聲佛南無地世界山王佛南無燃燈輪世界善住佛南無倚世界作一切功德佛南無波頭摩世界波頭摩生王佛南無星宿行世界智上勝佛南無法境世界自在王佛南無地功德世界波頭摩輪境界勝王佛南無普莊嚴世界大莊嚴佛境界佛南無歡喜世界畢竟成就佛寶功德佛南無蓋行莊嚴世界智起光明威德勝王佛南無寶光樂世界香炎平等莊嚴日光菩薩南無衆寶金剛藏世界觀勝妙清淨王菩薩復次懺悔由因世界留礙輪回若事日事月事星事火堅執不捨障顛倒故和合著成八萬四千精耀亂想故有色相羯南休咎精明吉凶悔吝暈玦負耳流星憐火螢爝蚌珠等類罪報懺悔銷散輪回厭有著空滅身歸無晦昧無聞惑顛倒故和合暗成八萬四千陰隱亂想故有無色羯南空散銷沉無色外道形色捐磨識合混沌等類罪報懺悔罔象輪回似有若無杳冥恍惚影顛倒故和合憶成八萬四千潛結亂想故有想相羯南神鬼精靈依草附木祠禱血食影響幽潛等類罪報懺悔愚鈍輪回顓蒙昏騃死灰固執癡顛倒故和合頑成八萬四千枯稿亂想故有無想羯南精神化為土木金石如鵲墮為印羣羊成石老僧為柏樹賢女變貞石佛性化為法性有情變作無情等類罪報懺悔相待輪回假勢借光潤身活命偽顛倒故和合染成八萬四千因依亂想故有非有色相成色羯南諸水母等以蝦為目璅蛣以蟹為腹戶蟲虰魚腹羊腦之蟲等類罪報懺悔相引輪回邪業符攝性顛倒故和合呪成八萬四千呼召亂想故有非無色相無色羯南呪詛厭生持明禁術妖巫折割樟柳羅神精魅遊魄及蝦蟆鶴鷺龍鷁莎雞聲唳相附等類罪報懺悔合妄輪回他胤冒贅罔顛倒故和合異成八萬四千回互亂想故有非有想相成想羯南二妄吸撮彼蒲盧等異質相成蠮螉之蟲孕螟蛉之子等類罪報懺悔怨害輪回絶倫滅性殺顛倒故和合怪成八萬四千食父母想故有非無想相無想羯南如土梟等附塊為兒及破鏡鳥以毒樹果抱為其子子成父母皆遭其食等類罪報如是衆生一一類中亦各各具十二顛倒猶如揑日亂花發生顛倒妙圓真淨明心具足如斯虗妄亂想相與歸投福足慧足十號具足大悲世尊懺悔南無東方壞諸煩惱佛南無南方妙音自在佛南無西方大雲光佛南無北方雲自在王佛南無東南方無緣莊嚴佛南無西南方過諸魔界佛南無西北方見無恐懼佛南無東北方一切德嚴佛南無上方蓮華藏光佛南無下方妙善住王佛南無八十億那由他同名釋迦牟尼佛南無八萬四千同名龍王佛南無八十千同名燃燈王佛南無五千同名波頭摩王佛南無九萬同名拘神王佛南無心不動佛南無心自在佛南無華林世界寶首菩薩南無寂靜世界持月光明菩薩南無栴檀世界真實幢菩薩南無堅固金世界夜光幢菩薩願諸世尊為我證明與我作眼我等未識三寶時隨順三毒疊造十惡所有業障煩惱障諸衆生障法障轉後來世障懺悔已復懺悔更不敢作我今於此志心懺悔願智清淨諸法業障當淨一切助菩提法願皆滿足永不墮地獄畜生餓鬼阿修羅若閻羅王世界違背遠離佛法僧處及逼迫苦惱之處又願我等於身命財一切放捨不生戀著財屬五家無主不久如大毒蛇為世怨害施為不死妙藥為無窮寶藏諸天世人因施得立我身無常匆匆營務被死賊害風刀解身一切捐棄佛説諸法從因緣有三世無體無有業障無業障處現作諸行亦無業障一切諸法空無有我本性空寂是則實際無漏際能淨一切法障而得寂靜各各解悟歸命三寶創建牟尼菴香火大檀越大方伯二品服色麗陽奉佛弟子木增損資刊用助此功德所願壽躋籛鏗雲仍爪者
